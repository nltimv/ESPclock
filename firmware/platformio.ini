; SPDX-License-Identifier: GPL-3.0-or-later
;
; Build environments:
;   d1_mini_tm1637    — ESP8266 Wemos D1 Mini + TM1637 display  (CLK=D1/GPIO5, DIO=D2/GPIO4)
;   esp32dev_tm1637   — ESP32 DevKit         + TM1637 display  (CLK=GPIO9,    DIO=GPIO10)
;   esp32dev_tm1652   — ESP32 DevKit         + TM1652 display  (DATA=GPIO6,   4 digits)
;
; To set a unique 4-character device ID, append to the env's build_flags:
;   -D DEVICE_ID='"wY5h"'
;
; To override default pin assignments, change the -D DISPLAY_* values below.

[platformio]
default_envs = d1_mini_tm1637, esp32dev_tm1637, esp32dev_tm1652

; ── Settings shared across every environment ───────────────────────────────
[env]
monitor_speed         = 115200
framework             = arduino
board_build.filesystem = littlefs
lib_extra_dirs        = ../lib

; ── ESP8266 Wemos D1 Mini + TM1637 ────────────────────────────────────────
[env:d1_mini_tm1637]
platform = espressif8266
board    = d1_mini
build_flags =
    -D DISPLAY_TM1637
    -D DISPLAY_CLK=5
    -D DISPLAY_DIO=4
lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    smougenot/TM1637@0.0.0-alpha+sha.9486982048
    esphome/ESPAsyncTCP-esphome@^2.0.0
    esphome/ESPAsyncWebServer-esphome@^3.0.0

; ── ESP32 DevKit + TM1637 ─────────────────────────────────────────────────
[env:esp32dev_tm1637]
platform = espressif32
board    = esp32dev
build_flags =
    -D DISPLAY_TM1637
    -D DISPLAY_CLK=9
    -D DISPLAY_DIO=10
lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    smougenot/TM1637@0.0.0-alpha+sha.9486982048
    mathieucarbou/AsyncTCP@^3.3.2
    mathieucarbou/ESPAsyncWebServer@^3.3.14

; ── ESP32 DevKit + TM1652 ─────────────────────────────────────────────────
[env:esp32dev_tm1652]
platform = espressif32
board    = esp32dev
build_flags =
    -D DISPLAY_TM1652
    -D DISPLAY_DATA_PIN=6
    -D DISPLAY_DIGITS=4
lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    maxint-solutions/TM16xx@^0.6.5
    mathieucarbou/AsyncTCP@^3.3.2
    mathieucarbou/ESPAsyncWebServer@^3.3.14
