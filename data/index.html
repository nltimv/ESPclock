/*parent div, where all elements are placed*/
.flex_container {

    border-style:none;

}

/* POPUP message (appears on top) */
.popup .popuptext {
  visibility: hidden;
  width: 160px;
  background-color: #dcdcdc;
  color: #000000;
  text-align: center;
  border-radius: 6px;
  padding: 8px 0;
  position: absolute;
  z-index: 1;
  bottom: 125%;
  left: 50%;
  margin-left: -80px;
}

/* Popup arrow */
.popup .popuptext::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  margin-left: -5px;
  border-width: 5px;
  border-style: solid;
  border-color: #dcdcdc transparent transparent transparent;
}

/* Toggle this class when clicking on the popup container (hide and show the popup) */
.popup .show {
  visibility: visible;
  -webkit-animation: fadeIn 5s;
  animation: fadeIn 5s
}

/*Add animation (fade in the popup) */ 
@-webkit-keyframes fadeIn {
 0%   {opacity: 0;}
 50%  {opacity:1 ;}
 100% {opacity: 0;}
}

@keyframes fadeIn {
    0%   {opacity: 0;}
    50%  {opacity: 1;}
    100% {opacity: 0;}
}

#pw{
    font-size: 15px;
    padding: 0 0 0 6px ;
    background-color: #444444;
    color: #bec1c4;
    height: 41px;
    width:230px;

}


.blinky{
height:30px;
}

.switch {
  margin: 0px 18px 0px 0px;
  position: relative;
  display: inline-block;
  width: 56px;
  height: 30px;
}

.switch input { /* Hide default HTML checkbox */
  opacity: 0;
  width: 0;
  height: 0;
}

/* The slider */
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #9c9c9c;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 22px;
  width: 22px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: #ae0423;
}

input:focus + .slider {
  box-shadow: 0 0 1px #ae0423;
}

input:checked + .slider:before {
/*content: 'A'; for auto brightness*/
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}

<script>
    let network_list;
    let ap_ssid = "";

    const wifi_section = document.getElementById("wifi_section");
    const ntp_section = document.getElementById("ntp_section");
    const display_section = document.getElementById("display_section");
    const config_section = document.getElementById("config_section");
    function networkFetch(json_path_or_route){
        
            fetch(json_path_or_route)
                    .then(data=> data.json())
                    .then(data=> {

                        //data is the json obj received from server
                        network_list= data;

                        //select label that will contain all of the options
                        const ssid_element = document.getElementById("ssid_list");
                        let ssid_prefix= "ssid";       
                        
                        //"Found" field that indicates how many networks are found after the scan
                        let foundnets = data.found;
                        
                        //this for populates the drop-down list (select label tag)
                        for(let i=0; i<foundnets; i++){

                            //creates new elem(option) for drop-down list
                            let add_option_n = document.createElement("option");

                            let ssidcounter =  i;

    let rem_d, rem_h, tothours, totmin;

    function msToUptime(millis, ms_over){
                //    totdays= data.ms/86400000;
          
                //at least a day has passed
                if(millis>= 86400000){   //days
                    rem_d= millis%86400000;    //for hours
                    dcounter.innerText = (49*ms_over) + Math.trunc((17*ms_over)/24) + Math.trunc(millis/86400000);

                    if(rem_d >= 3600000){   //calculate hours
                        hcounter.innerText = ((17*ms_over)%24) + Math.trunc((5*ms_over)/60) + Math.trunc(rem_d/3600000);
                        //tothours = rem_d/3600000;
                        
                        rem_h= rem_d%3600000;
                        if(rem_h <3600000){
                              mcounter.innerText= ((5*ms_over)%60) + Math.trunc(rem_h/60000);
                        }
                    }
                    else if(rem_d < 3600000){   //if millis are not enough to make an hour, then calculates minutes

                        hcounter.innerText = ((17*ms_over)%24) + Math.trunc((5*ms_over)/60);    //🔴Looks like it works good
                        mcounter.innerText= ((5*ms_over)%60) + Math.trunc(rem_d/60000);
                        //totmin= rem_d/60000;
                    }
                }

                //at least 1hr has passed
                else if(millis<86400000 && millis>=3600000){ 
                    dcounter.innerText = (49*ms_over) + Math.trunc((17*ms_over)/24);
                    hcounter.innerText = ((17*ms_over)%24) + Math.trunc((5*ms_over)/60) + Math.trunc(millis/3600000);
                    rem_h= millis%3600000;
                    if(rem_h <3600000){
                        mcounter.innerText= ((5*ms_over)%60) + Math.trunc(rem_h/60000);
                    }
                }

                //1 or 0 min passed
                else if(millis>=60000 && millis<3600000 || millis< 60000){   
                    dcounter.innerText = (49*ms_over) + Math.trunc((17*ms_over)/24);
                    hcounter.innerText = ((17*ms_over)%24) + Math.trunc((5*ms_over)/60);
                    mcounter.innerText= ((5*ms_over)%60) + Math.trunc(millis/60000);
                }    
            };

        function uptimeUpdate(){
            fetch("/uptime")
                .then(data=> data.json())
                .then(data=> {
                    msToUptime(data.ms, data.msovfl);

    let TZ_DATA = {};

    // Loads TZ_DATA directly from the flat {"Region/City": "POSIX"} JSON object.
    // POSIX values are used by the C++ lookup table; JS only needs the IANA keys.
    function buildTzData(raw) {
        TZ_DATA = raw;
    }

    function populateTzCity(regionSelId, citySelId, selectIana) {
        const region = document.getElementById(regionSelId).value;
        const citySel = document.getElementById(citySelId);
        citySel.innerHTML = '';
        const prefix = region === 'UTC' ? '' : region + '/';
        Object.keys(TZ_DATA)
            .filter(k => prefix ? k.startsWith(prefix) : k === 'UTC')
            .forEach(ianaName => {
                const opt = document.createElement('option');
                opt.value = ianaName;
                opt.textContent = ianaName.slice(prefix.length).replace(/_/g, ' ');
                citySel.appendChild(opt);
            });
        if (selectIana) citySel.value = selectIana;
    }

    function populateTzRegion(regionSelId, citySelId) {
        const regionSel = document.getElementById(regionSelId);
        regionSel.innerHTML = '';
        const regions = [...new Set(Object.keys(TZ_DATA).map(k => {
            const slash = k.indexOf('/');
            return slash >= 0 ? k.slice(0, slash) : k;
        }))];
        regions.forEach(region => {
            const opt = document.createElement('option');
            opt.value = region;
            opt.textContent = region;
            regionSel.appendChild(opt);
        });
        regionSel.addEventListener('change', () => populateTzCity(regionSelId, citySelId, null));
        populateTzCity(regionSelId, citySelId, null);
    }

    // Restore the region/city dropdowns directly from a saved IANA timezone name.
    function setTzFromIana(regionSelId, citySelId, ianaName) {
        if (!ianaName) return;
        const slash = ianaName.indexOf('/');
        const region = slash >= 0 ? ianaName.slice(0, slash) : ianaName;
        document.getElementById(regionSelId).value = region;
        populateTzCity(regionSelId, citySelId, ianaName);
    }

            fetch('/uicheck').then(r => r.json())
        ]).then(([tzRaw, data]) => {
            // Build grouped TZ_DATA from the flat IANA JSON, then populate dropdowns
            buildTzData(tzRaw);
            populateTzRegion('setup_tz_region', 'setup_tz_city');
            populateTzRegion('tz_region', 'tz_city');

                config_section.style.display = "none";
